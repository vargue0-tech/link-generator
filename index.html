<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Link Generator</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #171719;
      --panel: #111113;
      --text: #f4f4f5;
      --muted: #a1a1aa;
      --line: #2a2a2d;
      --field: #1d1d21;
      --field-border: #52525b;
      --debug-bg: #1d1d21;
      --debug-border: #3f3f46;
      --debug-text: #e4e4e7;
      --blue: #2563eb;
      --blue-strong: #1d4ed8;
      --red: #ffb4a8;
      --red-bg: #3b1212;
      --shadow: 0 16px 38px rgba(0, 0, 0, 0.42);
      --header-bg: #121214;
      --header-border: #2a2a2d;
      --header-text: #f4f4f5;
      --header-muted: #f4f4f5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--header-border);
      color: var(--header-text);
    }

    .top {
      max-width: 1180px;
      margin: 0 auto;
      padding: 18px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .top small {
      color: var(--header-muted);
      font-size: 13px;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 22px 40px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(340px, 0.9fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel-header {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-header h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 13px;
      color: var(--debug-text);
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--field-border);
      border-radius: 6px;
      background: var(--field);
      color: var(--text);
      font: inherit;
    }

    textarea {
      min-height: 310px;
      padding: 14px;
      resize: vertical;
      font-family: Menlo, Consolas, monospace;
      font-size: 13px;
    }

    input,
    select {
      height: 40px;
      padding: 0 10px;
    }

    .controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: 130px minmax(150px, 1fr);
      gap: 12px;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button,
    .button-link {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      white-space: nowrap;
    }

    button.primary {
      background: var(--blue);
      color: #fff;
    }

    button.primary:hover,
    .button-link:hover {
      background: var(--blue-strong);
    }

    button.secondary {
      background: var(--field);
      border-color: var(--field-border);
      color: var(--text);
    }

    .button-link {
      background: var(--blue);
      color: #fff;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
    }

    .result-list {
      display: grid;
      gap: 12px;
    }

    .result {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: var(--panel);
    }

    .result-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .result-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    code,
    pre {
      font-family: Menlo, Consolas, monospace;
      font-size: 12px;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--debug-text);
      background: var(--debug-bg);
      border: 1px solid var(--debug-border);
      border-radius: 6px;
      padding: 10px;
      max-height: 180px;
      overflow: auto;
    }

    .error {
      display: none;
      margin-bottom: 14px;
      border: 1px solid #f5b7b1;
      background: var(--red-bg);
      color: var(--red);
      border-radius: 8px;
      padding: 12px;
      font-weight: 700;
    }

    .empty {
      color: #c7c7ce;
      background: #1d1d21;
      border: 1px solid #2f2f35;
      border-radius: 6px;
      padding: 28px 10px;
      text-align: center;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    @media (max-width: 860px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .top {
        align-items: flex-start;
        flex-direction: column;
      }

      .header-actions {
        width: 100%;
        justify-content: space-between;
      }

      h1 {
        white-space: normal;
      }
    }

    @media (max-width: 520px) {
      main,
      .top {
        padding-left: 14px;
        padding-right: 14px;
      }

      .controls {
        grid-template-columns: 1fr;
      }

      textarea {
        min-height: 260px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="top">
      <div class="brand">
        <h1>Link Generator</h1>
      </div>
      <div class="header-actions">
        <small>Sabre Segments To Airline Links</small>
      </div>
    </div>
  </header>

  <main>
    <div class="layout">
      <section class="panel">
        <div class="panel-header">
          <h2>Input</h2>
        </div>
        <div class="panel-body">
          <label for="segmentsInput">Segments Format *IA</label>
          <textarea id="segmentsInput" spellcheck="false"></textarea>

          <div class="controls">
            <div>
              <label for="paxInput">Passengers</label>
              <input id="paxInput" type="number" min="1" max="9" value="2">
            </div>
            <div>
              <label for="airlineMode">Airline Type</label>
              <select id="airlineMode">
                <option value="aa">American Airlines</option>
              </select>
            </div>
          </div>

          <div class="actions">
            <button class="primary" id="generateButton" type="button">Generate Links</button>
            <button class="secondary" id="clearButton" type="button">Clear</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Results</h2>
          <span class="hint" id="summary">No Links Yet</span>
        </div>
        <div class="panel-body">
          <div class="error" id="errorBox"></div>
          <div class="result-list" id="results">
            <div class="empty">Generate Links To See Results Here.</div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const generateButton = document.getElementById('generateButton');
    const clearButton = document.getElementById('clearButton');
    const input = document.getElementById('segmentsInput');
    const paxInput = document.getElementById('paxInput');
    const airlineMode = document.getElementById('airlineMode');
    const results = document.getElementById('results');
    const errorBox = document.getElementById('errorBox');
    const summary = document.getElementById('summary');

    generateButton.addEventListener('click', generateLinks);

    clearButton.addEventListener('click', () => {
      input.value = '';
    });

    function generateLinks() {
      hideError();

      const text = input.value.trim();
      const pax = Number(paxInput.value);

      if (!text) {
        showError('Paste Sabre Segments First.');
        return;
      }

      if (!Number.isInteger(pax) || pax < 1 || pax > 9) {
        showError('Passengers Must Be A Number From 1 To 9.');
        return;
      }

      const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
      const segments = parseSabreSegments(lines);

      if (segments.length === 0) {
        showError('Could Not Recognize Any Flight Segments.');
        return;
      }

      const trips = splitIntoTrips(segments);
      const cards = [];

      trips.forEach((tripSegments, tripIndex) => {
        const journeys = buildJourneys(tripSegments);
        const first = tripSegments[0];
        const last = tripSegments[tripSegments.length - 1];
        const routeLabel = `${first.origin}-${last.destination}`;
        const debug = tripSegments
          .map(s => `${s.segmentNo}. ${s.carrier}${s.flight}${s.bookingClass} ${s.origin}-${s.destination} ${s.dateText} ${s.departText} J${s.journeyIndex}`)
          .join('\n');

        if (airlineMode.value === 'aa' || airlineMode.value === 'both') {
          cards.push({
            title: `AA ${tripIndex + 1}: ${routeLabel}`,
            url: buildAaMetaSearchLink(tripSegments, journeys, pax),
            debug,
          });
        }

        if (airlineMode.value === 'delta' || airlineMode.value === 'both') {
          cards.push({
            title: `Delta ${tripIndex + 1}: ${routeLabel}`,
            url: buildDeltaSearchLink(tripSegments, pax),
            debug,
          });
        }
      });

      renderResults(cards);
      summary.textContent = `${cards.length} Link${cards.length === 1 ? '' : 's'}`;
    }

    function renderResults(cards) {
      results.innerHTML = '';

      cards.forEach((card, index) => {
        const item = document.createElement('article');
        item.className = 'result';

        const title = document.createElement('div');
        title.className = 'result-title';
        title.innerHTML = `<span>${escapeHtml(card.title)}</span>`;

        const actions = document.createElement('div');
        actions.className = 'result-actions';

        const open = document.createElement('a');
        open.className = 'button-link';
        open.href = card.url;
        open.target = '_blank';
        open.rel = 'noreferrer';
        open.textContent = 'Open';

        const copy = document.createElement('button');
        copy.className = 'secondary';
        copy.type = 'button';
        copy.textContent = 'Copy';
        copy.addEventListener('click', async () => {
          await navigator.clipboard.writeText(card.url);
          copy.textContent = 'Copied';
          setTimeout(() => {
            copy.textContent = 'Copy';
          }, 1200);
        });

        const debug = document.createElement('pre');
        debug.textContent = card.debug;

        actions.append(open, copy);
        item.append(title, actions, debug);
        results.append(item);
      });
    }

    function splitIntoTrips(segments) {
      return [segments];
    }

    function parseSabreSegments(lines) {
      const segments = [];

      lines.forEach(line => {
        const clean = line.trim().replace(/\s+/g, ' ');
        if (/^OPERATED BY/i.test(clean)) return;

        const match = clean.match(
          /^(\d+)\s+([A-Z0-9]{2})\s*([0-9]{1,4})([A-Z])?\s+(\d{1,2}[A-Z]{3})\s+[A-Z]\s+([A-Z]{3})([A-Z]{3})\*?\s*([A-Z]{2}\d+)\s+([0-9]{1,4}[AP])\s+([0-9]{1,4}[AP])?/i
        );

        if (!match) return;

        const segment = {
          segmentNo: Number(match[1]),
          carrier: match[2].toUpperCase(),
          flight: match[3],
          bookingClass: (match[4] || '').toUpperCase(),
          dateText: match[5].toUpperCase(),
          origin: match[6].toUpperCase(),
          destination: match[7].toUpperCase(),
          status: match[8].toUpperCase(),
          departText: match[9].toUpperCase(),
          arriveText: match[10] ? match[10].toUpperCase() : '',
          journeyIndex: 0,
        };

        segment.departureMs = sabreDateTimeToMs(segment.dateText, segment.departText);
        segments.push(segment);
      });

      return segments;
    }

    function buildJourneys(segments) {
      const journeys = [];
      let current = null;

      segments.forEach((segment, index) => {
        const previous = segments[index - 1];
        const connectedAirports = previous && previous.destination === segment.origin;
        const hasEuropeOrTransatlantic =
          previous &&
          (
            isEuropeAirport(previous.origin) ||
            isEuropeAirport(previous.destination) ||
            isEuropeAirport(segment.origin) ||
            isEuropeAirport(segment.destination) ||
            isTransatlanticCarrier(previous.carrier) ||
            isTransatlanticCarrier(segment.carrier)
          );

        const maxConnectionHours = hasEuropeOrTransatlantic ? 72 : 30;
        const connected =
          connectedAirports &&
          hoursBetween(previous.departureMs, segment.departureMs) <= maxConnectionHours;
        const shouldConnect = connected && hasEuropeOrTransatlantic;

        if (!current || !shouldConnect) {
          current = {
            index: journeys.length,
            origin: segment.origin,
            destination: segment.destination,
            departureMs: segment.departureMs,
            segments: [],
          };
          journeys.push(current);
        }

        current.destination = segment.destination;
        current.segments.push(segment);
        segment.journeyIndex = current.index;
      });

      journeys.forEach(journey => {
        const mainSegment =
          journey.segments.find(s => isMainJourneySegment(s)) ||
          journey.segments[0];

        journey.departureMs = mainSegment.departureMs;
      });

      return journeys;
    }

    function buildAaMetaSearchLink(segments, journeys, pax) {
      const firstJourney = journeys[0];
      const passengerBlock = `A${pax}S0C0I0Y0L0`;
      const tripType = 'multi';

      const routeBlock = journeys
        .map(j => `#${j.origin}|${j.destination}|0|0|${j.departureMs}`)
        .join('');

      const flightBlock = segments
        .map(s => `#${s.carrier}|${s.flight}|${s.bookingClass}|${s.origin}|${s.destination}|${s.departureMs}|${s.journeyIndex}`)
        .join('');

      const parts = [
        'GOOGLE',
        '0',
        'US',
        tripType,
        '4',
        passengerBlock,
        '0',
        firstJourney.origin,
        '0',
        firstJourney.destination,
        '0',
        '0',
        '0',
        '0',
        '0',
        '0',
        '0',
        '2730.57',
        '1',
        encodeURIComponent(routeBlock),
        encodeURIComponent(flightBlock),
      ];

      return `https://www.aa.com/goto/metasearch?ITEN=${parts.join(',')}`;
    }

    function buildDeltaSearchLink(segments, pax) {
      const first = segments[0];
      const last = segments[segments.length - 1];
      const departureDate = sabreDateToMmDdYyyy(first.dateText);

      const params = {
        tripType: 'ONE_WAY',
        originCity: first.origin,
        destinationCity: last.destination,
        departureDate,
        paxCount: pax,
        priceSchedule: 'price',
        cabinFareClass: 'MAIN',
        searchByCabin: 'true',
        deltaOnlySearch: 'false',
        deltaOnly: 'deltaPartner',
      };

      const query = Object.keys(params)
        .map(key => `${encodeURIComponent(key)}=${encodeURIComponent(params[key])}`)
        .join('&');

      return `https://www.delta.com/flightsearch/book-a-flight?${query}`;
    }

    function sabreDateTimeToMs(dateText, timeText) {
      const months = monthMap();
      const dateMatch = dateText.match(/^(\d{1,2})([A-Z]{3})$/);
      const timeMatch = timeText.match(/^(\d{1,4})([AP])$/);

      if (!dateMatch || !timeMatch) {
        throw new Error(`Could not read date/time: ${dateText} ${timeText}`);
      }

      const day = Number(dateMatch[1]);
      const month = months[dateMatch[2]];
      const year = inferYear(month, day);
      const parsed = parseAmPmTime(timeText);

      return Date.UTC(year, month, day, parsed.hour, parsed.minute);
    }

    function sabreDateToMmDdYyyy(dateText) {
      const months = monthMap();
      const match = dateText.match(/^(\d{1,2})([A-Z]{3})$/);

      if (!match) {
        throw new Error(`Could not read date: ${dateText}`);
      }

      const day = Number(match[1]);
      const month = months[match[2]];
      const year = inferYear(month, day);

      return `${String(month + 1).padStart(2, '0')}/${String(day).padStart(2, '0')}/${year}`;
    }

    function parseAmPmTime(timeText) {
      const match = timeText.match(/^(\d{1,4})([AP])$/);
      let rawTime = match[1];
      const ampm = match[2];

      while (rawTime.length < 3) rawTime = `0${rawTime}`;

      let hour = Number(rawTime.slice(0, -2));
      const minute = Number(rawTime.slice(-2));

      if (ampm === 'A' && hour === 12) hour = 0;
      if (ampm === 'P' && hour !== 12) hour += 12;

      return { hour, minute };
    }

    function inferYear(month, day) {
      const now = new Date();
      let year = now.getFullYear();
      const candidate = new Date(year, month, day);

      if (candidate < new Date(now.getFullYear(), now.getMonth(), now.getDate() - 2)) {
        year++;
      }

      return year;
    }

    function monthMap() {
      return {
        JAN: 0,
        FEB: 1,
        MAR: 2,
        APR: 3,
        MAY: 4,
        JUN: 5,
        JUL: 6,
        AUG: 7,
        SEP: 8,
        OCT: 9,
        NOV: 10,
        DEC: 11,
      };
    }

    function hoursBetween(a, b) {
      return Math.abs(b - a) / 36e5;
    }

    function daysBetween(a, b) {
      return Math.abs(b - a) / 864e5;
    }

    function isEuropeAirport(code) {
      const airports = {
        LHR: true,
        CDG: true,
        FLR: true,
        NAP: true,
        FCO: true,
        MAD: true,
        BCN: true,
        AMS: true,
        FRA: true,
        MUC: true,
        ZRH: true,
        DUB: true,
        LIS: true,
        MXP: true,
        VCE: true,
        TLV: true,
      };

      return airports[code] === true;
    }

    function isTransatlanticCarrier(carrier) {
      const carriers = {
        AA: true,
        BA: true,
        EI: true,
        IB: true,
        AY: true,
      };

      return carriers[carrier] === true;
    }

    function isMainJourneySegment(segment) {
      return (
        isEuropeAirport(segment.origin) ||
        isEuropeAirport(segment.destination) ||
        isTransatlanticCarrier(segment.carrier)
      );
    }

    function showError(message) {
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    function hideError() {
      errorBox.textContent = '';
      errorBox.style.display = 'none';
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
</html>
